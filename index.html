<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VM 2026 Quiz</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <div id="loginBox" class="quiz-box">
    <div class="flag-container">
  <img src="sverige.gif" class="waving-flag" alt="Sveriges flagga">
</div>
    <h1>VM 2026 Quiz</h1>
<div id="countdownBox">
  <h2>Quizet öppnar om</h2>
  <p id="countdown"></p>
</div>
    <div id="passwordArea" style="display: none;">
  <p>Ange lösenord för att starta quizet:</p>

  <input type="password" id="passwordInput" placeholder="Lösenord">

  <button onclick="checkPassword()">Lås upp quiz</button>

  <p id="error"></p>
</div>
  </div>

  <main id="quizContent" class="quiz-box" style="display: none;">
    <div class="flag-container">
  <img src="sverige.gif" class="waving-flag" alt="Sveriges flagga">
</div>
    <h1>VM 2026 Quiz</h1>

    <div id="startBox">
      <p>Skriv ditt namn innan du startar quizet.</p>
      <input id="playerName" type="text" placeholder="Ditt namn">
      <button id="startBtn">Starta quiz</button>
    </div>

    <div id="quizBox" style="display: none;">
      <p id="progress"></p>
      <img id="questionImage" class="question-image" style="display: none;">
      <audio id="questionAudio" controls style="display: none;"></audio>
      <p id="question">Frågan visas här</p>
      <div id="answers"></div>
      <p id="feedback"></p>
      <p id="score"></p>
      <button id="restartBtn" style="display: none;">Spela igen</button>
    </div>
  </main>
</main>

<audio id="fanfareSound" src="fanfare.mp3"></audio>
<audio id="nationalAnthem" src="sverige-national.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="script.js?v=7"></script>

</body>
</html>
